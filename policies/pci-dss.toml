# CloakPipe policy — PCI-DSS (payment card data).
# Tuned for cardholder data: PANs, amounts, secrets. No plaintext card storage.
# Use it with:  cloakpipe -c policies/pci-dss.toml start
#
# Note: "Supports PCI-DSS workflows" is a technical capability — a formal QSA
# audit is required for certification.

profile = "fintech"

[proxy]
listen = "127.0.0.1:8900"
upstream = "https://api.openai.com"
api_key_env = "OPENAI_API_KEY"
timeout_seconds = 120
max_concurrent = 256
mode = "proxy"

[vault]
path = "./vault.enc"
encryption = "aes-256-gcm"
key_env = "CLOAKPIPE_VAULT_KEY"

[detection]
secrets = true
financial = true
dates = false
emails = true
phone_numbers = false
ip_addresses = false
urls_internal = false

[detection.ner]
enabled = false

[audit]
enabled = true
log_path = "./audit/"
format = "jsonl"
retention_days = 365
log_entities = true
log_mappings = false
