# CloakPipe policy — India Digital Personal Data Protection Act (DPDP) 2023.
# Tuned for Indian PII: Aadhaar, PAN, GSTIN, UPI, phone numbers.
# Use it with:  cloakpipe -c policies/dpdp.toml start
#
# Note: "Supports DPDP compliance" is a technical capability, not a
# certification — there is no DPDP certification body.

profile = "fintech"

[proxy]
listen = "127.0.0.1:8900"
upstream = "https://api.openai.com"
api_key_env = "OPENAI_API_KEY"
timeout_seconds = 120
max_concurrent = 256
mode = "proxy"

[vault]
path = "./vault.enc"
encryption = "aes-256-gcm"
key_env = "CLOAKPIPE_VAULT_KEY"

[detection]
secrets = true
financial = true
dates = true
emails = true
phone_numbers = true
ip_addresses = true
urls_internal = false

[detection.ner]
enabled = false

[audit]
enabled = true
log_path = "./audit/"
format = "jsonl"
retention_days = 90
log_entities = true
log_mappings = false
